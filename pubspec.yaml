name: hifz_companion
description: "Hifz Companion - Quran Memorization App (Phase 1: Foundation)"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.0
  record: ^5.2.1
  audioplayers: ^6.0.0
  permission_handler: ^11.0.0
  shared_preferences: ^2.2.0
  cupertino_icons: ^1.0.8

dependency_overrides:
  # Forces the compiler to pull matching modern versions of the internal platform 
  # interface scripts, stopping the record_linux compilation crash completely.
  record_platform_interface: ^1.6.1
  record_linux: ^1.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/quran_data.json
