name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Scaffold Android platform folder
        run: flutter create --platforms=android --project-name hifz_companion --org com.hifzcompanion .

      - name: Apply custom Android manifest and app icons
        run: |
          cp -f android_overlay/app/src/main/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          cp -rf android_overlay/app/src/main/res/mipmap-mdpi/. android/app/src/main/res/mipmap-mdpi/
          cp -rf android_overlay/app/src/main/res/mipmap-hdpi/. android/app/src/main/res/mipmap-hdpi/
          cp -rf android_overlay/app/src/main/res/mipmap-xhdpi/. android/app/src/main/res/mipmap-xhdpi/
          cp -rf android_overlay/app/src/main/res/mipmap-xxhdpi/. android/app/src/main/res/mipmap-xxhdpi/
          cp -rf android_overlay/app/src/main/res/mipmap-xxxhdpi/. android/app/src/main/res/mipmap-xxxhdpi/

      - name: Force compileSdk 35 / targetSdk 35 / minSdk 23 (required by audioplayers_android and record_android)
        run: |
          GRADLE_FILE="android/app/build.gradle"
          IS_KTS=false
          if [ -f "android/app/build.gradle.kts" ]; then
            GRADLE_FILE="android/app/build.gradle.kts"
            IS_KTS=true
          fi
          echo "Appending SDK overrides to $GRADLE_FILE (kts=$IS_KTS)"
          if [ "$IS_KTS" = true ]; then
            cat >> "$GRADLE_FILE" << 'EOF'

// --- Appended override: required minimum SDK levels for our plugins ---
android {
    compileSdk = 35
    defaultConfig {
        minSdk = 23
        targetSdk = 35
    }
}
EOF
          else
            cat >> "$GRADLE_FILE" << 'EOF'

// --- Appended override: required minimum SDK levels for our plugins ---
android {
    compileSdkVersion 35
    defaultConfig {
        minSdkVersion 23
        targetSdkVersion 35
    }
}
EOF
          fi
          echo "----- Full $GRADLE_FILE after append -----"
          cat "$GRADLE_FILE"

      - name: Get Flutter packages
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hifz-companion-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
